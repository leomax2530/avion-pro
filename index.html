V<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego Avión Pro - Modo Campaña</title>
<style>
  body {
    margin: 0;
    background: #0a0a0c;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Arial', sans-serif;
    user-select: none;
  }

  canvas {
    background: radial-gradient(circle, #001824 0%, #00080c 100%);
    border: 4px solid #00ffcc;
    box-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
    border-radius: 4px;
  }
</style>
</head>
<body>

<canvas id="game" width="900" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const W = canvas.width;
const H = canvas.height;

// =====================
// ESTADOS
// =====================
let gameOver = false;
let gameWon = false;
let score = 0;
let currentLevel = 1;
let shake = 0;
let screenFlash = 0;

// =====================
// INPUT
// =====================
let keys = {};
document.addEventListener("keydown", e => {
  unlockAudio();
  keys[e.key] = true;
  if ((gameOver || gameWon) && (e.key === 'r' || e.key === 'R')) resetCampaign();
});

document.addEventListener("keyup", e => (keys[e.key] = false));
document.addEventListener("click", () => {
  if (!gameOver && !gameWon) fireBullet();
});

// =====================
// PAUSA
// =====================
let paused = false;
document.addEventListener("keydown", e => {
  if(e.key === 'p' || e.key === 'P') paused = !paused;



// T: abrir/cerrar tienda cuando el juego esté activo
  if(e.key === 't' || e.key === 'T' || e.key === 'm' || e.key === 'M'){
      e.preventDefault();
    
    // Forzamos que el overlay aparezca siempre que estés en juego
    if(!gameOver && !gameWon){
      unlockAudio();

      storeOpen = true;
      paused = true;
    }
  }


  // controles de tienda
  if(storeOpen && !gameOver && !gameWon){



    if(e.key === 'Escape' || e.key === 't' || e.key === 'T'){
      storeOpen = false;
      paused = false;
      return;
    }

    const k = e.key;
    if(k === '1') buyShip(ships[0]);
    if(k === '2') buyShip(ships[1]);
    if(k === '3') buyShip(ships[2]);
    if(k === '4') buyShip(ships[3]);

    if(e.key === 'Enter'){
      // Enter compra la nave seleccionada (si alcanzas monedas)
      buyShip(currentShip);
    }
  }
});


// =====================
// TIENDA / COINS
// =====================
let coins = 0;
let storeOpen = false;
let storeIndex = 0;
let lastStoreActionT = 0;


let ships = [
  // Cada nave define: tipo de disparo y estilo (para dibujarlo)
  { id: 'basica',  name: 'Basica',  cost: 0,   lifeMul: 1.0, weaponLevel: 1, fireCooldownMul: 1.0, spreadMul: 1.0, style: 'tri', weaponMode: 'pulse' },
  { id: 'aguila',  name: 'Aguila',  cost: 40,  lifeMul: 0.95, weaponLevel: 2, fireCooldownMul: 0.85, spreadMul: 1.05, style: 'wing', weaponMode: 'triple' },
  { id: 'titan',   name: 'Titan',   cost: 90,  lifeMul: 1.3, weaponLevel: 2, fireCooldownMul: 1.05, spreadMul: 0.95, style: 'bulky', weaponMode: 'buster' },
  { id: 'cazador', name: 'Cazador', cost: 160, lifeMul: 0.9, weaponLevel: 1, fireCooldownMul: 0.8, spreadMul: 0.75, style: 'sleek', weaponMode: 'missile' },
  { id: 'nocturne',name: 'Nocturne',cost: 260, lifeMul: 1.0, weaponLevel: 3, fireCooldownMul: 0.9, spreadMul: 1.1, style: 'ghost', weaponMode: 'cluster' },
];

let currentShip = ships[0];

function toggleStore(){
  storeOpen = !storeOpen;
  // si abres la tienda, haz pausa para no perder vida mientras eliges nave
  paused = storeOpen;
}


function applyShipStats(ship){
  currentShip = ship;

  player.maxLife = Math.round(15 * ship.lifeMul);
  // al cambiar de nave, recarga vida para que el cambio se sienta
  player.life = player.maxLife;

  weaponLevel = ship.weaponLevel;
  // reinicia cooldown del arma para evitar que te quedes trabado
  weaponCooldown = 0;
}

function buyShip(ship){
  if(storeOpen !== true) return;
  if(ship.id === currentShip.id) return;
  if(coins < ship.cost) return;

  coins -= ship.cost;
  applyShipStats(ship);
  storeOpen = false;
  paused = false;
}

function drawStoreOverlay(){
  // Dim background
  ctx.save();
  ctx.fillStyle = "rgba(0,0,0,0.55)";
  ctx.fillRect(0,0,W,H);

  // Header
  ctx.fillStyle = "#00ffcc";
  ctx.font = "bold 32px Arial";
  ctx.textAlign = "center";
  ctx.fillText("TIENDA DE NAVES", W/2, 90);

  ctx.fillStyle = "#ffff00";
  ctx.font = "bold 18px Arial";
  ctx.fillText("COINS: " + coins, W/2, 125);

  // Listado
  const x0 = 130;
  const y0 = 170;
  const rowH = 60;

  ctx.font = "bold 16px Arial";
  ctx.textAlign = "left";

  for(let i=0;i<ships.length;i++){
    const s = ships[i];
    const y = y0 + i*rowH;

    const selected = (s.id === currentShip.id);
    ctx.fillStyle = selected ? "rgba(0,255,204,0.20)" : "rgba(255,255,255,0.06)";
    ctx.strokeStyle = selected ? "#00ffcc" : "rgba(255,255,255,0.22)";
    ctx.lineWidth = 2;

    // rect con esquinas redondeadas (aprox)
    const rw = 640;
    const rh = 44;
    ctx.beginPath();
    ctx.roundRect(x0, y-10, rw, rh, 10);
    ctx.fill();
    ctx.stroke();

    // info
    ctx.fillStyle = selected ? "#00ffcc" : "#dff";
    const hotkey = (i+1);
    ctx.fillText(hotkey + ") " + s.name, x0 + 18, y + 18);

    ctx.fillStyle = "#ffff00";
    ctx.fillText("Costo: " + s.cost, x0 + 320, y + 18);

    // stats rápidas
    ctx.fillStyle = "#ffffff";
    const statTxt = `VIDA x${s.lifeMul.toFixed(2)} | Arma L${s.weaponLevel}`;
    ctx.font = "14px Arial";
    ctx.fillText(statTxt, x0 + 18, y + 38);
    ctx.font = "bold 16px Arial";

    // aviso compra
    ctx.fillStyle = "#00ffcc";
    if(s.id !== currentShip.id){
      ctx.font = "14px Arial";
      const can = coins >= s.cost;
      ctx.fillText(can ? "[ENTER] Comprar" : "[Falta coins]", x0 + 520, y + 38);
      ctx.font = "bold 16px Arial";
    }
  }

  // instrucciones
  ctx.fillStyle = "#ffffff";
  ctx.font = "16px Arial";
  ctx.fillText("T: cerrar tienda | 1-4: comprar/seleccionar nave", W/2, H-70);
  ctx.restore();
}



// =====================
// WORLD / ENTIDADES
// =====================
let player = {
  x: W/2,
  y: H-70,
  r: 18,
  life: 15,
  maxLife: 15,
  shootCooldown: 0,
  invuln: 0,
};

let bullets = [];
let enemyBullets = [];
let enemies = [];
let particles = [];

// Power-ups de arma
let powerups = [];

let wave = {
  active: false,
  remaining: 0,
  timer: 0,
  spawnCooldown: 0,
  index: 0,
  locked: false,
};

// Boss (Nivel 5)
let boss = {
  active: false,
  x: W/2,
  y: -140,
  w: 170,
  h: 110,
  life: 100,
  maxLife: 100,
  vx: 2.6,
  shootCooldown: 0,
  phase: 1,
  t: 0,

  // misiles perseguidor
  missiles: [],
  missileCooldown: 0,
};


// =====================
// UTILIDADES
// =====================
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

function rand(a, b){ return a + Math.random() * (b - a); }

function spawnExplosion(x, y, colorA, colorB, power = 1){
  sfxExplosion(power);
  const count = Math.floor(18 * power);
  for(let i=0;i<count;i++){

    const ang = Math.random() * Math.PI * 2;
    const sp = rand(1.2, 5.2) * power;
    particles.push({
      x, y,
      vx: Math.cos(ang) * sp,
      vy: Math.sin(ang) * sp,
      life: rand(18, 38),
      maxLife: 38,
      c1: colorA,
      c2: colorB,
      size: rand(1, 3.5) * power,
      kind: "spark"
    });
  }
  screenFlash = 1;
  shake = Math.max(shake, 6 * power);
}

function addTrail(x,y,dir){
  for(let i=0;i<2;i++){
    particles.push({
      x: x + rand(-2,2),
      y: y + rand(-2,2),
      vx: dir.x * rand(0.2,0.6) + rand(-0.3,0.3),
      vy: dir.y * rand(0.2,0.6) + rand(-0.3,0.3),
      life: rand(8,14),
      maxLife: 14,
      c1:"#00ffcc",
      c2:"#007a66",
      size: rand(1,2.2),
      kind:"trail"
    });
  }
}

// =====================
// SONIDO (WebAudio)
// =====================
let audioCtx = null;
let audioUnlocked = false;
let audioUnlockTimer = 0;


function unlockAudio(){
  if(audioUnlocked) return;
  // evita intentar abrir contexto demasiadas veces
  const now = performance.now();
  if(now - audioUnlockTimer < 250) return;
  audioUnlockTimer = now;
  try{

    const AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return;
    audioCtx = new AC();
    audioUnlocked = true;
  }catch(e){
    // silencioso
  }
}

function sfxTone({freq=440, dur=0.06, type='square', gain=0.06, slideTo=null, pan=0}={}){
  if(!audioUnlocked || !audioCtx) return;
  const t0 = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();

  osc.type = type;
  osc.frequency.setValueAtTime(freq, t0);
  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(Math.min(9000, freq*3), t0);

  if(slideTo !== null){
    osc.frequency.exponentialRampToValueAtTime(Math.max(20, slideTo), t0 + dur);
  }

  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(gain, t0 + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);

  let out = filter;
  // panner estéreo si existe
  if(audioCtx.createStereoPanner){
    const p = audioCtx.createStereoPanner();
    p.pan.setValueAtTime(pan, t0);
    filter.connect(p);
    p.connect(g);
    out = null;
    // g conectado a destination
    g.connect(audioCtx.destination);
    osc.connect(filter);
  }else{
    filter.connect(g);
    g.connect(audioCtx.destination);
    osc.connect(filter);
  }

  osc.start(t0);
  osc.stop(t0 + dur + 0.01);
}

function sfxNoiseBlast({dur=0.12, gain=0.06, freq=220}={}){
  if(!audioUnlocked || !audioCtx) return;
  const t0 = audioCtx.currentTime;
  const bufferSize = Math.max(1, Math.floor(audioCtx.sampleRate * dur));
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for(let i=0;i<bufferSize;i++){
    data[i] = (Math.random()*2-1) * Math.pow(1 - i/bufferSize, 2.3);
  }
  const src = audioCtx.createBufferSource();
  src.buffer = buffer;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.setValueAtTime(freq, t0);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(gain, t0 + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  src.connect(filter);
  filter.connect(g);
  g.connect(audioCtx.destination);
  src.start(t0);
  src.stop(t0 + dur + 0.02);
}

let sfxLimiter = {shot:0, hit:0, hurt:0, boom:0};
function canSfx(key, cdMs=40){
  const now = performance.now();
  if(now - (sfxLimiter[key]||0) < cdMs) return false;
  sfxLimiter[key]=now;
  return true;
}

function sfxShot(){
  if(!canSfx('shot', 35)) return;
  // pequeño “pew” dependiendo de ship/weaponLevel
  const base = 260 + weaponLevel*70;
  sfxTone({freq: base, dur: 0.05, type: 'square', gain: 0.035, slideTo: base*0.6, pan: (Math.random()-0.5)*0.35});
}

function sfxEnemyShot(){
  if(!canSfx('shot', 45)) return;
  const base = 180 + currentLevel*12;
  sfxTone({freq: base, dur: 0.05, type: 'sawtooth', gain: 0.03, slideTo: base*0.55, pan: (Math.random()-0.5)*0.5});
}

function sfxHit(){
  if(!canSfx('hit', 55)) return;
  sfxTone({freq: 520 + currentLevel*10, dur: 0.07, type: 'triangle', gain: 0.04, slideTo: 140, pan: (Math.random()-0.5)*0.4});
}

function sfxHurt(){
  if(!canSfx('hurt', 120)) return;
  sfxNoiseBlast({dur:0.14, gain:0.05, freq: 120});
  sfxTone({freq: 90, dur: 0.12, type: 'square', gain: 0.02});
}

function sfxExplosion(power=1){
  if(!canSfx('boom', 90)) return;
  const dur = 0.08 + power*0.06;
  sfxNoiseBlast({dur, gain: 0.06*power, freq: 220 + 240*power});
  sfxTone({freq: 180 + 90*power, dur: 0.09, type:'sawtooth', gain: 0.02*power, slideTo: 60});
}

function sfxWin(){
  if(!canSfx('boom', 800)) return;
  sfxTone({freq: 523, dur:0.18, type:'triangle', gain:0.05, slideTo:392});
  setTimeout(()=>sfxTone({freq:659, dur:0.18, type:'triangle', gain:0.05, slideTo:494}), 90);
  setTimeout(()=>sfxTone({freq:784, dur:0.22, type:'triangle', gain:0.06, slideTo:587}), 180);
}

function sfxGameOver(){
  if(!canSfx('hurt', 800)) return;
  sfxTone({freq: 170, dur:0.25, type:'square', gain:0.05, slideTo:60});
  setTimeout(()=>sfxTone({freq: 130, dur:0.25, type:'square', gain:0.05, slideTo:40}), 90);
}

// =====================
// DISPAROS
// =====================
let weaponLevel = 1; // 1=normal, 2=doble, 3=triple
let weaponCooldown = 0;

// =====================
// LIMITES ANTI-LAG
// =====================
const MAX_BULLETS = 160;
const MAX_ENEMY_BULLETS = 260;
const MAX_PARTICLES = 520;
const MAX_POWERUPS = 18;


function pushCapped(arr, max, item){
  if(arr.length >= max) return;
  arr.push(item);
}

function fireBullet(){
  if(weaponCooldown > 0) return;
  weaponCooldown = 0;

  sfxShot();

  // Modos por nave: además de variar el spread, cambian la "forma" del disparo.
  // (Fallback si por cualquier razón no existe weaponMode)
  const modeRaw = currentShip && currentShip.weaponMode ? currentShip.weaponMode : 'pulse';
  const mode = String(modeRaw).toLowerCase();





  // Duración/velocidad bases
  const baseVy = -10;
  const spreadBase = weaponLevel === 1 ? 0 : (weaponLevel === 2 ? 0.18 : 0.28);

  // helper para disparo estándar
  const pushBullet = (x, y, vx, vy, life, size) => {
    if(bullets.length >= MAX_BULLETS) return;
    bullets.push({ x, y, vx, vy, life, size });
  };

  if(mode === 'pulse'){
    // PULSE prutal: 3 balas con "recoil" + estela extra
    const spread = (spreadBase * 1.35) + (weaponLevel >= 3 ? 0.03 : 0);
    const count = 3;
    for(let i=0;i<count;i++){
      const t = (i-1); // -1,0,1
      const offset = t * spread;
      const vx = offset * 8;
      const size = 4.8 - Math.abs(t)*0.4;
      const life = 92 + (weaponLevel*2);
      pushBullet(player.x + offset*22, player.y - 10, vx, baseVy*1.03, life, size);
      addTrail(player.x + offset*16, player.y - 8, {x: vx, y: baseVy});
    }
    // "onda" visual
    if(Math.random() < 0.9){
      for(let k=0;k<14;k++){
        particles.push({
          x: player.x + rand(-14,14),
          y: player.y - 12 + rand(-6,6),
          vx: rand(-2.5,2.5),
          vy: rand(-2.8,0.8),
          life: rand(10,18),
          maxLife: 18,
          c1: '#fffb00',
          c2: '#ff3355',
          size: rand(1,3),
          kind: 'spark'
        });
      }
    }
  } else if(mode === 'triple'){
    // TRIPLE brutal: 5 balas (abanico) + balas fantasma
    const spread = spreadBase * 1.35;
    const vxMul = 8.2;
    const offsets = [-2,-1,0,1,2];
    const activeCount = weaponLevel >= 3 ? 5 : 4;
    for(let i=0;i<activeCount;i++){
      const t = offsets[i - Math.floor(activeCount/2)];
      const offset = t * spread;
      const vx = offset * vxMul;
      const life = 88;
      const size = 4.2;
      pushBullet(player.x + offset*16, player.y - 9, vx, baseVy*1.02, life, size);
      addTrail(player.x + offset*12, player.y - 8, {x: vx, y: baseVy});
    }
    // ráfaga fantasma extra
    if(Math.random() < 0.55){
      for(let i=-2;i<=2;i+=4){
        pushBullet(player.x + i*14, player.y - 8, i*2.8, baseVy*1.06, 48, 3.1);
      }
    }
  } else if(mode === 'buster'){
    // BUSTER brutal: 2 balas grandes + "carga" de partículas
    const spread = spreadBase * 0.75;
    const count = (weaponLevel >= 2 ? 2 : 1);
    for(let i=0;i<count;i++){
      const offset = (count === 2) ? (i===0?-spread:spread) : 0;
      const vx = offset*5.3;
      pushBullet(player.x + offset*28, player.y - 12, vx, baseVy*1.04, 120 + weaponLevel*8, 6.0);
      // estela gorda
      for(let s=0;s<6;s++) addTrail(player.x + offset*20, player.y - 10, {x:vx, y:baseVy});
    }
    for(let k=0;k<22;k++){
      particles.push({
        x: player.x + rand(-10,10),
        y: player.y - 10 + rand(-6,6),
        vx: rand(-3.5,3.5),
        vy: rand(-3.5,1),
        life: rand(12,22),
        maxLife: 22,
        c1: '#00ffcc',
        c2: '#ff6600',
        size: rand(1.2,3.6),
        kind: 'spark'
      });
    }
  } else if(mode === 'missile'){
    // MISSILE brutal: cohetes (pero sin homing) + mini cluster
    const spread = spreadBase * 1.05;
    const count = 1 + (weaponLevel >= 2 ? 1 : 0);
    for(let i=0;i<count;i++){
      const offset = (count === 2) ? (i===0?-spread:spread) : 0;
      const vx = offset*7;
      pushBullet(player.x + offset*22, player.y - 10, vx, baseVy*1.0, 78 + weaponLevel*6, 5.0);
      addTrail(player.x + offset*18, player.y - 12, {x: vx, y: baseVy});
    }
    if(Math.random() < 0.45 && weaponLevel >= 3){
      for(let k=0;k<5;k++){
        const off = rand(-spreadBase*2.0, spreadBase*2.0);
        pushBullet(player.x + off*18, player.y - 10, off*7, baseVy*0.98, 56, 3.8);
      }
      for(let k=0;k<18;k++){
        particles.push({
          x: player.x + rand(-12,12),
          y: player.y - 10,
          vx: rand(-4,4),
          vy: rand(-4,1.2),
          life: rand(10,18),
          maxLife: 18,
          c1:'#fffb00',
          c2:'#00ffcc',
          size: rand(1,3),
          kind:'spark'
        });
      }
    }
  } else if(mode === 'cluster'){
    // CLUSTER brutal: 7-11 mini balas + estallido visual
    const spread = spreadBase * 1.45;
    const baseCount = 3 + (weaponLevel >= 2 ? 2 : 0) + (weaponLevel >= 3 ? 2 : 0);
    const count = Math.min(11, baseCount);
    for(let i=0;i<count;i++){
      const offset = (i - (count-1)/2) * (spread/Math.max(1,(count-1)));
      const vx = offset*9;
      const life = 62 + weaponLevel*4;
      pushBullet(player.x + offset*16, player.y - 9, vx, baseVy*1.01, life, 3.6);
      if(i%2===0) addTrail(player.x + offset*12, player.y - 10, {x:vx, y:baseVy});
    }
    for(let k=0;k<34;k++){
      particles.push({
        x: player.x + rand(-14,14),
        y: player.y - 12 + rand(-6,6),
        vx: rand(-5,5),
        vy: rand(-5,1.2),
        life: rand(10,20),
        maxLife: 20,
        c1: '#ffff00',
        c2: '#ff3355',
        size: rand(1,3.2),
        kind: 'spark'
      });
    }
  } else {
    // fallback: estándar (brutalizado un poco)
    const spread = spreadBase;
    const count = weaponLevel === 1 ? 2 : (weaponLevel === 2 ? 3 : 4);
    for(let i=0;i<count;i++){
      const offset = (count === 2) ? (i===0?-spread:spread) : (i-(count-1)/2)*spread;
      pushBullet(player.x + offset*18, player.y - 10, offset*7, baseVy*1.02, 84, 4.4);
      addTrail(player.x + offset*12, player.y - 8, {x: offset*7, y: baseVy});
    }
  }

  // Cadencia más estable (menos "rapid-fire" caótico)
  weaponCooldown = 6 + (weaponLevel >= 3 ? 2 : 0);
}

function shootEnemyBullets(e, pattern, speed){
  // Anti-lag: evita que el boss/oleadas saturen balas
  if(enemyBullets.length >= MAX_ENEMY_BULLETS) return;
  sfxEnemyShot();

  const cx = e.x;
  const cy = e.y;
  const base = {x:0,y:1};

  if(pattern === "fan"){
    const count = 5;
    for(let i=0;i<count;i++){
      const t = (i/(count-1)) * 2 - 1; // -1..1
      enemyBullets.push({
        x: cx, y: cy,
        vx: t * 2.1,
        vy: speed,
        life: 120,
        r: 3.2,
      });
    }
  } else if(pattern === "line"){
    enemyBullets.push({ x: cx, y: cy, vx: 0, vy: speed, life: 120, r: 3.2 });
    enemyBullets.push({ x: cx, y: cy, vx: rand(-0.6,0.6), vy: speed*1.02, life: 120, r: 3.2 });
  } else if(pattern === "burst"){
    for(let i=0;i<7;i++){
      const ang = rand(-0.6,0.6);
      const s = speed * rand(0.85,1.15);
      enemyBullets.push({
        x: cx, y: cy,
        vx: Math.sin(ang)*s,
        vy: Math.cos(ang)*s,
        life: 120,
        r: 2.8
      });
    }
  }
}

// =====================
// CAMPAÑA
// =====================
function resetCampaign(){
  gameOver = false;
  gameWon = false;
  score = 0;
  currentLevel = 1;
  coins = 0;
  storeOpen = false;
  currentShip = ships[0];

  player.life = player.maxLife;
  player.invuln = 0;
  player.x = W/2;
  player.y = H-70;

  // reiniciar mejora de arma
  weaponLevel = 1;
  weaponCooldown = 0;

  bullets = [];
  enemyBullets = [];
  enemies = [];
  particles = [];
  powerups = [];

  setupLevel(currentLevel);
}

function setupLevel(level){
  bullets = [];
  enemyBullets = [];
  enemies = [];
  particles = [];

  boss.active = false;
  boss.phase = 1;
  boss.t = 0;
  boss.shootCooldown = 0;

  player.x = W/2;
  player.y = H-70;
  player.life = player.maxLife;
  player.invuln = 0;

  // Boss cada 5 niveles: 5 y 10
  // Jefe FINAL solo en nivel 10
  if(level === 10){
    setupBoss(level);
  } else {
    // Oleadas por tipo (niveles 1-4 genérico, 6-9 con enemigos/patrones distintos)
    wave.active = true;
    wave.index = 0;
    wave.remaining = 12 + level*6;
    wave.timer = 0;
    wave.spawnCooldown = 10;
    spawnWaveChunk(level);
  }
}

function spawnWaveChunk(level){
  // elimina “buss”: todos los villanos son iguales, pero más brutos por oleada
  if(wave.remaining <= 0) return;

  const toSpawn = Math.min(6 + Math.floor(level*1.2), wave.remaining);
  wave.remaining -= toSpawn;
  wave.index++;

  const speed = 1.3 + level*0.45;
  const zig = 1.15 + level*0.1;

  for(let i=0;i<toSpawn;i++){
    const side = Math.random() < 0.5 ? -1 : 1;

    // Villano “grande” en nivel 5 (tipo mini-boss dentro de oleada)
    const isBig = (level === 5 && i === 0);

    enemies.push({
      x: rand(60, W-60),
      y: rand(50, 170),
      r: isBig ? 28 : 16,
      hp: isBig ? 5 : 1 + (level>=3?1:0),
      life: isBig ? 5 : 1 + (level>=3?1:0),
      t: rand(0, 1000),
      vx: side * speed * (isBig ? 0.7 : 1),
      vy: speed * rand(0.7, 1.25) * (isBig ? 0.8 : 1),
      zig: isBig ? (zig * 0.5) : zig,
      shootCd: isBig ? rand(60, 120) : rand(35, 85),
      points: isBig ? 800 : (120 + level*35),
      phase: rand(0,1000)
    });
  }
}

function setupBoss(){
  boss.active = true;
  boss.x = W/2;
  boss.y = -140;
  boss.life = boss.maxLife;

  // sistema de misiles perseguidor
  boss.missiles = [];
  boss.missileCooldown = 0;
}


// =====================
// LOOP UPDATE
// =====================
function update(){
  // Pausa la lógica del juego en pantalla de inicio
  if(showStartScreen && !startPressed) return;
  // Pausa manual
  if(paused) return;

  // (Desactivado) Misiles perseguidor del boss.
  // Se removieron para evitar que te bajen vida en el nivel 5.
  if(boss.active){
    boss.missiles = [];
  }

  if(gameOver || gameWon) return;

  // movimiento


  let sp = 7;
  if(keys["Shift"] ) sp = 9;
  if(keys["ArrowLeft"] || keys["a"] || keys["A"]) player.x -= sp;
  if(keys["ArrowRight"] || keys["d"] || keys["D"]) player.x += sp;
  if(keys["ArrowUp"] || keys["w"] || keys["W"]) player.y -= sp*0.7;
  if(keys["ArrowDown"] || keys["s"] || keys["S"]) player.y += sp*0.7;

  player.x = clamp(player.x, 18, W-18);
  // límite de movimiento: más estricto hacia arriba (no te deja subir demasiado)
  const topLimit = 70; // píxeles desde arriba
  player.y = clamp(player.y, topLimit, H-18);


  // invuln + disparo
  // (modo brutal) feedback visual cuando cae un power-up de vida
  // NOTA: como eliminamos el auto-regenerado, aquí solo queda la base para mostrar el ícono



  if(player.invuln > 0) player.invuln--;
  if(weaponCooldown > 0) weaponCooldown--;

  // disparo: Espacio o Click
  if ((keys[" "] || keys["Spacebar"]) && weaponCooldown === 0){
    fireBullet();
  }

  // balas jugador
  bullets.forEach(b => {
    b.x += b.vx;
    b.y += b.vy;
    b.life--;
    if(b.life%3===0) addTrail(b.x,b.y,{x:0,y:-1});
  });
  bullets = bullets.filter(b => b.life > 0 && b.y > -20);

  // balas enemigos
  enemyBullets.forEach(b => {
    b.x += b.vx;
    b.y += b.vy;
    b.life--;
  });
  enemyBullets = enemyBullets.filter(b => b.life > 0 && b.y < H+40 && b.x > -40 && b.x < W+40);

  // powerups (caen)
  powerups.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.t++;
  });
  powerups = powerups.filter(p => p.t < p.ttl && p.y < H+40);

  // colisión powerup vs jugador
  powerups.forEach(p => {
    if(p.kind === 'weapon' && Math.hypot(player.x - p.x, player.y - p.y) < 18){
      p.dead = true;
      if(weaponLevel < 3) weaponLevel++;
      spawnExplosion(player.x, player.y, '#00ffcc', '#001824', 0.35);
    }
  });
  powerups = powerups.filter(p => !p.dead);


  // ENEMIGOS (sin tipos/buss)
  if(!boss.active){
    if(wave.active){
      wave.timer++;
      if(wave.spawnCooldown-- <= 0 && wave.remaining > 0){
        spawnWaveChunk(currentLevel);
        wave.spawnCooldown = Math.max(12, 22 - currentLevel*1.5);
      }
      if(wave.remaining <= 0){
        wave.active = false;
      }
    }

    const speedBoost = 1 + currentLevel*0.09;

    enemies.forEach(e => {
      e.t += 0.06 + currentLevel*0.004;
      // movimiento lateral más agresivo
      const lateralSpeed = (2.4 + currentLevel*0.25);
      e.x += Math.sin(e.t) * e.zig * lateralSpeed;

      // mantener a los enemigos en “carril” (sin caer hacia abajo)
      // en vez de aumentar su Y, solo ondulamos ligeramente alrededor de su spawn
      const baseY = e.baseY ?? (e.baseY = e.y);
      const amp = (10 + currentLevel * 2) * 0.35;
      e.y = baseY + Math.sin(e.t * 1.1 + e.phase * 0.001) * amp;


      // auto rebote en bordes: queremos que vayan de esquina a esquina
      if(e.x < 24){ e.x = 24; e.baseY = e.baseY ?? e.y; e.t *= -1; }
      if(e.x > W-24){ e.x = W-24; e.baseY = e.baseY ?? e.y; e.t *= -1; }


  // disparo: menos balas y menos frecuencia para que no sea imparable
      e.shootCd--;
      if(e.shootCd <= 0){
        // bajar probabilidad de disparo MUCHO más
        if(Math.random() < 0.35){
          // casi siempre tiros simples (menos balas)
          const p = (Math.random()<0.8) ? "line" : "burst";
          const spd = (2.2 + currentLevel*0.35);
          shootEnemyBullets(e, p, spd);
        }
        // cooldown más grande
        e.shootCd = Math.max(70, rand(90, 150) - currentLevel*2);

      }
    });

    // colisión balas vs enemigos
    bullets.forEach(b => {
      enemies.forEach(e => {
        if(e.life > 0 && Math.hypot(b.x-e.x, b.y-e.y) < 16){
            e.life--;
            b.life = 0;
            sfxHit();
            spawnExplosion(e.x, e.y, "#00ffcc", "#001824", 0.6);

  if(e.life <= 0){
            e.dead = true;
            score += e.points;
            coins += Math.floor(e.points / 120); // monedas por enemigo


            // caída de powerup de arma (más probable en niveles altos)
            const chance = (currentLevel >= 3 ? 0.12 : 0.06);
            if(Math.random() < chance){
              powerups.push({
                kind: 'weapon',
                x: e.x,
                y: e.y,
                vx: rand(-1.2, 1.2),
                vy: rand(0.6, 1.2),
                t: 0,
                ttl: 600,
              });
            }
          }

        }
      });
    });

    // colisión enemigos vs jugador (toque = castigo fuerte)
    enemies.forEach(e => {
      if(!e.dead && Math.hypot(player.x-e.x, player.y-e.y) < 18){
        if(player.invuln === 0){
          player.life -= 3;
          player.invuln = 25;
          sfxHurt();
          spawnExplosion(player.x, player.y, "#ff3355", "#24000a", 0.9);

        }
        e.dead = true;
      }
    });

    enemies = enemies.filter(e => !e.dead && e.y < H+40);

    // siguiente nivel
    if(!boss.active && enemies.length === 0 && !wave.active && wave.remaining <= 0){
      currentLevel++;
      // Boss en 5 y 10, y el juego termina al llegar a 10.
      if(currentLevel <= 10) setupLevel(currentLevel);
      else gameWon = true;
    }

  } else {
    // BOSS
    boss.t++;

    if(boss.y < 66){
      boss.y += 2.3;
    } else {
      // fase por vida
      const p = boss.life / boss.maxLife;
      boss.phase = (p > 0.66) ? 1 : (p > 0.33 ? 2 : 3);

      boss.x += boss.vx;
      if(boss.x <= boss.w/2 + 20 || boss.x >= W - boss.w/2 - 20) boss.vx *= -1;

      boss.shootCooldown--;
      if(boss.shootCooldown <= 0){
        const baseSpeed = 4.6 + currentLevel*0.35;
        if(boss.phase === 1){
          // frontal abanico
          for(let i=-3;i<=3;i++){
            enemyBullets.push({
              x: boss.x,
              y: boss.y + boss.h - 18,
              vx: i*0.55,
              vy: baseSpeed + Math.abs(i)*0.25,
              life: 160,
              r: 3.2
            });
          }
          boss.shootCooldown = 34;
        } else if(boss.phase === 2){
          // sweep: más lateral
          const count = 9;
          for(let i=0;i<count;i++){
            const ang = (i/(count-1))*Math.PI*0.9 + Math.PI*0.05;
            const s = baseSpeed*0.95;
            enemyBullets.push({
              x: boss.x + rand(-20,20),
              y: boss.y + rand(20, boss.h-10),
              vx: Math.cos(ang)*s,
              vy: Math.sin(ang)*s + 1.5,
              life: 180,
              r: 2.8
            });
          }
          boss.shootCooldown = 44;
        } else {
          // cargas/cluster
          const cx = boss.x;
          const cy = boss.y + boss.h - 20;
          for(let k=0;k<12;k++){
            enemyBullets.push({
              x: cx,
              y: cy,
              vx: rand(-3.2,3.2),
              vy: baseSpeed + rand(-0.4, 0.8),
              life: 190,
              r: 2.6
            });
          }
          // ráfaga extra a veces
          if(Math.random() < 0.35){
            for(let i=0;i<5;i++){
              enemyBullets.push({ x: cx, y: cy,
                vx: rand(-1.5,1.5), vy: baseSpeed*1.15,
                life: 180, r: 3.0
              });
            }
          }
          boss.shootCooldown = 30;
        }
      }
    }

    // colisión balas jugador vs boss
    bullets.forEach(b => {
        if(b.life > 0){
        const bx0 = boss.x - boss.w/2;
        const by0 = boss.y;

        const hit = (b.x > bx0 && b.x < bx0 + boss.w && b.y > by0 && b.y < by0 + boss.h);
        if(hit){
          b.life = 0;
          boss.life--;
          sfxHit();
          spawnExplosion(b.x, b.y, "#ff6600", "#001824", 0.45);
          score += 80;

          if(boss.life <= 0){
            gameWon = true;
            score += 15000;
            sfxWin();
          }

        }
      }
    });
  }

  // colisión balas enemigas vs jugador
  enemyBullets.forEach(b => {
    if(b.life > 0){
      if(Math.hypot(player.x-b.x, player.y-b.y) < 16){
        b.life = 0;
        if(player.invuln === 0){
          player.life--;
          player.invuln = 18;
          sfxHurt();
          shake = Math.max(shake, 7);
          screenFlash = 1;
        }

      }
    }
  });

  // particles
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    // gravedad suave para chispas
    if(p.kind === "spark") p.vy += 0.02;
  });
  particles = particles.filter(p => p.life > 0);

  bullets = bullets.filter(b => b.life > 0);
  enemyBullets = enemyBullets.filter(b => b.life > 0);

  if(player.life <= 0){
    player.life = 0;
    gameOver = true;
    sfxGameOver();
    spawnExplosion(player.x, player.y, "#ff3355", "#0a0a0c", 2);
  }
}

function drawStarfield(){
  // escaneo simple
  const t = performance.now()/1000;
  ctx.save();
  ctx.globalAlpha = 0.55;
  for(let i=0;i<70;i++){
    const x = (i*97 % W);
    const y = (i*53 % H);
    const p = (y + t*90) % (H+40);
    ctx.fillStyle = i%7===0 ? "#00ffcc" : "#79ffd9";
    ctx.fillRect(x, p, 1.2, 1.2);
  }
  // líneas de escaneo
  ctx.globalAlpha = 0.25;
  const scanY = (t*120)%H;
  ctx.fillStyle = "rgba(0,255,204,0.18)";
  ctx.fillRect(0, scanY, W, 2);
  ctx.restore();
}

function drawShipPlayer(){
  // Nave "prutal" (dibujo por estilo de la nave)
  const x = player.x;
  const y = player.y;

  const wob = Math.sin(performance.now()/120 + x*0.01) * 1.2;
  const style = (currentShip && currentShip.style) ? currentShip.style : 'tri';

  // escala por estilo
  const scale = (style === 'bulky') ? 1.15 : (style === 'sleek') ? 0.95 : (style === 'wing') ? 1.05 : 1.0;

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(wob*0.01);
  ctx.scale(scale, scale);

  // colores brutales
  const cHull = (style === 'ghost') ? '#7dfcff' : (style === 'bulky') ? '#00ffcc' : (style === 'sleek') ? '#a6ffe8' : '#00ffcc';
  const cEdge = (style === 'ghost') ? '#001824' : 'rgba(0,0,0,0.65)';
  const glow = (player.invuln>0) ? '#ff0055' : ((style === 'ghost') ? '#ffff00' : '#fffb00');

  // motor/afterburner
  ctx.fillStyle = glow;
  ctx.globalAlpha = 1;
  ctx.beginPath();
  ctx.moveTo(-10, 20);
  ctx.lineTo(0, 34);
  ctx.lineTo(10, 20);
  ctx.closePath();
  ctx.fill();

  // "llama" extra
  const flick = 1 + Math.sin(performance.now()/60) * 0.12;
  ctx.fillStyle = (player.invuln>0) ? '#ff3355' : '#fffb00';
  ctx.globalAlpha = 0.9;
  ctx.beginPath();
  ctx.moveTo(-7, 22*flick);
  ctx.lineTo(0, 30*flick);
  ctx.lineTo(7, 22*flick);
  ctx.closePath();
  ctx.fill();

  // casco base (tri + variaciones)
  ctx.fillStyle = cHull;
  ctx.strokeStyle = cEdge;
  ctx.lineWidth = 2;

  // alas/forma según estilo
  ctx.beginPath();
  if(style === 'wing'){
    // ala doble agresiva
    ctx.moveTo(0, -26);
    ctx.lineTo(22, -2);
    ctx.lineTo(14, 10);
    ctx.lineTo(34, 16);
    ctx.lineTo(12, 24);
    ctx.lineTo(0, 14);
    ctx.lineTo(-12, 24);
    ctx.lineTo(-34, 16);
    ctx.lineTo(-14, 10);
    ctx.lineTo(-22, -2);
    ctx.closePath();
  } else if(style === 'bulky'){
    // casco gordito tipo buster
    ctx.moveTo(0, -24);
    ctx.lineTo(24, 0);
    ctx.quadraticCurveTo(18, 18, 0, 26);
    ctx.quadraticCurveTo(-18, 18, -24, 0);
    ctx.closePath();
  } else if(style === 'sleek'){
    // rápido y fino
    ctx.moveTo(0, -30);
    ctx.lineTo(18, -6);
    ctx.lineTo(10, 12);
    ctx.lineTo(0, 18);
    ctx.lineTo(-10, 12);
    ctx.lineTo(-18, -6);
    ctx.closePath();
  } else if(style === 'ghost'){
    // fantasma: contorno doble
    ctx.moveTo(0, -26);
    ctx.lineTo(20, -4);
    ctx.lineTo(12, 10);
    ctx.lineTo(0, 22);
    ctx.lineTo(-12, 10);
    ctx.lineTo(-20, -4);
    ctx.closePath();
  } else {
    // base (tri prutal)
    ctx.moveTo(0, -24);
    ctx.lineTo(20, 4);
    ctx.lineTo(12, 16);
    ctx.lineTo(0, 10);
    ctx.lineTo(-12, 16);
    ctx.lineTo(-20, 4);
    ctx.closePath();
  }

  ctx.fill();
  ctx.stroke();

  // cabina (cristal)
  ctx.fillStyle = (style === 'ghost') ? '#0a0a0c' : '#001824';
  ctx.beginPath();
  ctx.ellipse(0, -6, 7, 9, 0, 0, Math.PI*2);
  ctx.fill();

  ctx.strokeStyle = (style === 'ghost') ? '#ff0055' : 'rgba(0,255,204,0.7)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-6, -9);
  ctx.lineTo(6, -9);
  ctx.stroke();

  // cuchillas/dentado
  ctx.strokeStyle = (player.invuln>0) ? '#ffffff' : 'rgba(0,255,204,0.7)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-14, 4);
  ctx.lineTo(-6, -10);
  ctx.moveTo(14, 4);
  ctx.lineTo(6, -10);
  ctx.stroke();

  // detalle central
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.beginPath();
  ctx.roundRect(-6, -2, 12, 24, 6);
  ctx.fill();

  // resplandor si invuln
  if(player.invuln>0){
    ctx.globalAlpha = 0.18;
    ctx.strokeStyle = '#ff3355';
    ctx.lineWidth = 8;
    ctx.strokeRect(-22, -35, 44, 70);
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

function drawEnemy(e){
  ctx.save();
  ctx.translate(e.x, e.y);

  // base
  ctx.fillStyle = "#ff3333";
  ctx.strokeStyle = "rgba(0,0,0,0.55)";
  ctx.lineWidth = 2;

  // cuerpo angular
  ctx.beginPath();
  ctx.moveTo(0, -e.r);
  ctx.lineTo(e.r*1.05, 0);
  ctx.lineTo(0, e.r);
  ctx.lineTo(-e.r*1.05, 0);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // “ojos”/torretas
  ctx.fillStyle = "#00ffcc";
  ctx.beginPath();
  ctx.arc(-6, -2, 2.2, 0, Math.PI*2);
  ctx.arc(6, -2, 2.2, 0, Math.PI*2);
  ctx.fill();

  // escape
  ctx.fillStyle = "#001824";
  ctx.beginPath();
  ctx.moveTo(-5, e.r);
  ctx.lineTo(0, e.r+8);
  ctx.lineTo(5, e.r);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawBoss(){
  // fase más brutal visual
  const glow = boss.phase===1?"#00ffcc":boss.phase===2?"#ffff00":"#ff3355";

  ctx.save();
  ctx.translate(boss.x, boss.y);

  // cuerpo
  ctx.fillStyle = "rgba(0,0,0,0.35)";
  ctx.fillRect(-boss.w/2-10, -10, boss.w+20, boss.h+20);

  ctx.fillStyle = "#001824";
  ctx.strokeStyle = glow;
  ctx.lineWidth = 3;

  // casco
  ctx.beginPath();
  ctx.moveTo(-boss.w/2+20, boss.h-10);
  ctx.lineTo(-boss.w/2+55, -10);
  ctx.lineTo(0, -24);
  ctx.lineTo(boss.w/2-55, -10);
  ctx.lineTo(boss.w/2-20, boss.h-10);
  ctx.quadraticCurveTo(0, boss.h+30, -boss.w/2+20, boss.h-10);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // torretas
  ctx.fillStyle = glow;
  for(let i=0;i<4;i++){
    const tx = -boss.w/2 + 35 + i*(boss.w-70)/3;
    const ty = 22 + (i%2)*18;
    ctx.beginPath();
    ctx.roundRect(tx-10, ty-10, 20, 14, 6);
    ctx.fill();
  }

  // núcleo
  ctx.fillStyle = "#0a0a0c";
  ctx.beginPath();
  ctx.ellipse(0, boss.h*0.35, 34, 22, 0, 0, Math.PI*2);
  ctx.fill();

  // ojos vivos
  ctx.fillStyle = boss.phase===3?"#ff0055":"#00ffcc";
  ctx.beginPath();
  ctx.arc(-16, boss.h*0.35-2, 7, 0, Math.PI*2);
  ctx.arc(16, boss.h*0.35-2, 7, 0, Math.PI*2);
  ctx.fill();

  ctx.restore();
}

function drawParticles(){
  for(const p of particles){
    const a = p.life / p.maxLife;
    ctx.globalAlpha = clamp(a, 0, 1);

    const grd = ctx.createLinearGradient(p.x, p.y, p.x, p.y+10);
    grd.addColorStop(0, p.c1);
    grd.addColorStop(1, p.c2);

    ctx.fillStyle = grd;
    ctx.beginPath();
    if(p.kind==="spark"){
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    } else {
      ctx.fillRect(p.x, p.y, p.size*2, p.size);
    }
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function draw(){
  // Shop overlay
  if(storeOpen){
    drawStoreOverlay();
    return;
  }

  // Anti-lag duro: si hay demasiadas partículas, recorta
  if(particles.length > MAX_PARTICLES){
    particles.length = MAX_PARTICLES;
  }

  // (opcional) recorte bullets si algo se desborda
  if(bullets.length > MAX_BULLETS) bullets.length = MAX_BULLETS;
  if(enemyBullets.length > MAX_ENEMY_BULLETS) enemyBullets.length = MAX_ENEMY_BULLETS;


  // shake
  const sx = (Math.random()-0.5) * shake;
  const sy = (Math.random()-0.5) * shake;
  shake = Math.max(0, shake - 0.5);

  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,W,H);

  drawStarfield();

  if(sx!==0 || sy!==0){
    ctx.save();
    ctx.translate(sx, sy);
  }

  // HUD
  ctx.fillStyle = "#dff";
  ctx.font = "bold 16px Arial";
  ctx.fillText("VIDA", 18, 24);

  // barra vida
  const barX = 60;
  const barY = 14;
  const barW = 200;
  const barH = 12;
  ctx.fillStyle = "rgba(255,255,255,0.1)";
  ctx.fillRect(barX, barY, barW, barH);
  ctx.fillStyle = player.life <= 5 ? "#ff3355" : "#00ffcc";
  ctx.fillRect(barX, barY, barW * (player.life/player.maxLife), barH);
  ctx.strokeStyle = "rgba(0,255,204,0.7)";
  ctx.strokeRect(barX, barY, barW, barH);

  ctx.fillStyle = "#ffff00";
  ctx.font = "bold 18px Arial";
  ctx.fillText("NIVEL: " + (currentLevel===5?"JEFE FINAL":currentLevel), W/2 - 95, 28);

  ctx.fillStyle = "#00ffcc";
  ctx.font = "bold 16px Arial";
  ctx.textAlign = "right";
  ctx.fillText("COINS: " + coins, W-18, 46);
  ctx.fillText("SCORE: " + score, W-18, 24);
  ctx.textAlign = "left";


  if(!boss.active){
    // oleadas: barra de presión
    ctx.fillStyle = "rgba(0,255,204,0.12)";
    ctx.fillRect(W/2-140, 54, 280, 10);
    const pct = wave.remaining>0 ? 1 - wave.remaining/(12 + currentLevel*6) : 1;
    ctx.fillStyle = "#00ffcc";
    ctx.fillRect(W/2-140, 54, 280 * pct, 10);
    ctx.strokeStyle = "rgba(255,255,255,0.5)";
    ctx.strokeRect(W/2-140, 54, 280, 10);
  } else {
    // barra boss
    let barW = 420;
    let barH = 14;
    let barX = W/2 - barW/2;
    let barY = 50;
    ctx.fillStyle = "rgba(255,255,255,0.08)";
    ctx.fillRect(barX, barY, barW, barH);
    const currentBarW = (boss.life/boss.maxLife)*barW;
    ctx.fillStyle = boss.phase===3?"#ff3355":boss.phase===2?"#ffff00":"#ff0055";
    ctx.fillRect(barX, barY, currentBarW, barH);
    ctx.strokeStyle = "rgba(255,255,255,0.8)";
    ctx.lineWidth = 2;
    ctx.strokeRect(barX, barY, barW, barH);
    ctx.fillStyle = glow = boss.phase===3?"#ff3355":boss.phase===2?"#ffff00":"#ff0055";
    ctx.font = "bold 14px Arial";
    ctx.fillText("FASE: " + boss.phase, barX + 10, barY - 6);
  }

  // jugador
  if(player.invuln>0){
    if(Math.floor(performance.now()/80)%2===0){
      drawShipPlayer();
    }
  } else {
    drawShipPlayer();
  }

  // enemigos
  if(!boss.active){
    enemies.forEach(drawEnemy);
  } else {
    drawBoss();
  }

  // powerups
  powerups.forEach(p => {
    if(p.kind === 'weapon'){
      ctx.fillStyle = '#ffff00';
      ctx.beginPath();
      ctx.arc(p.x, p.y, 10, 0, Math.PI*2);
      ctx.fill();
      ctx.strokeStyle = '#00ffcc';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  });

  // balas
  ctx.fillStyle = "#fffb00";
  bullets.forEach(b => {
    ctx.fillRect(b.x-b.size/2, b.y-10, b.size, 10);
  });

  ctx.fillStyle = "#ff3333";
  enemyBullets.forEach(b => {
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
    ctx.fill();
  });

  // partículas
  drawParticles();

  if(sx!==0 || sy!==0) ctx.restore();

  // pantalla final
  if(gameOver || gameWon){
    ctx.fillStyle = "rgba(4, 10, 15, 0.92)";
    ctx.fillRect(0,0,W,H);

    ctx.textAlign = "center";
    if(gameOver){
      ctx.fillStyle = "#ff3355";
      ctx.font = "bold 56px Arial";
      ctx.fillText("GAME OVER", W/2, H/2 - 10);
      ctx.fillStyle = "#ffffff";
      ctx.font = "20px Arial";
      ctx.fillText("Llegaste hasta Nivel: " + (currentLevel===5?"Jefe Final":currentLevel), W/2, H/2 + 30);
    } else if(gameWon){
      ctx.fillStyle = "#00ffcc";
      ctx.font = "bold 52px Arial";
      ctx.fillText("CAMPAÑA COMPLETADA!", W/2, H/2 - 10);
      ctx.fillStyle = "#ffffff";
      ctx.font = "26px Arial";
      ctx.fillText("¡Más brutal todavía!", W/2, H/2 + 30);
    }

    ctx.fillStyle = "#00ffcc";
    ctx.font = "20px Arial";
    ctx.fillText("Puntuación Final: " + score, W/2, H/2 + 75);

    ctx.fillStyle = "#8899a6";
    ctx.font = "16px Arial";
    ctx.fillText("Presiona 'R' para reiniciar", W/2, H/2 + 125);
    ctx.textAlign = "left";
  }

  // flash
  if(screenFlash > 0){
    ctx.fillStyle = "rgba(0,255,204,0.08)";
    ctx.fillRect(0,0,W,H);
    screenFlash -= 0.08;
  }
}

// Polyfill para roundRect (algunos browsers antiguos)
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    r = Math.min(r, w/2, h/2);
    this.beginPath();
    this.moveTo(x+r, y);
    this.arcTo(x+w, y, x+w, y+h, r);
    this.arcTo(x+w, y+h, x, y+h, r);
    this.arcTo(x, y+h, x, y, r);
    this.arcTo(x, y, x+w, y, r);
    this.closePath();
    return this;
  }
}

// =====================
// START
// =====================
let showStartScreen = true;
let startPressed = false;

resetCampaign();

// Pausa la lógica hasta que el jugador presione una tecla o haga click.
// Excluimos 'T' y 'Escape' para no interferir con la tienda.
document.addEventListener("keydown", e => {
  if(showStartScreen && !startPressed){
    if(e.key === 't' || e.key === 'T' || e.key === 'Escape') return;

    if(e.key === 'Enter' || e.key === ' ' || e.key === 'e' || e.key === 'E' || e.key === '1' || e.key === '2' || e.key === '3') startPressed = true;
    if(startPressed) showStartScreen = false;
  }
});


document.addEventListener("click", () => {
  unlockAudio();
  if(showStartScreen && !startPressed){
    startPressed = true;
    showStartScreen = false;
  }
});


function loop(){
  update();
  draw();

  // Pantalla de inicio (se dibuja encima en el mismo canvas)
  if(showStartScreen){
    drawStartOverlay();
  }

  // Si la tienda está abierta, dibujar overlay aunque estés fuera del gameplay.
  if(storeOpen){
    drawStoreOverlay();
  }

  requestAnimationFrame(loop);
}


function drawStartOverlay(){
  unlockAudio();

  ctx.save();
  ctx.fillStyle = "rgba(0,0,0,0.55)";
  ctx.fillRect(0,0,W,H);

  ctx.textAlign = "center";
  ctx.fillStyle = "#00ffcc";
  ctx.font = "bold 44px Arial";
  ctx.fillText("AVIÓN PRO", W/2, H/2 - 110);

  ctx.fillStyle = "#ffff00";
  ctx.font = "bold 20px Arial";
  ctx.fillText("Modo Campaña", W/2, H/2 - 70);

  ctx.fillStyle = "#dff";
  ctx.font = "16px Arial";
  const lines = [
    "Controles:",
    "- Flechas / WASD: mover",
    "- Espacio (o Click): disparar",
    "- Shift: más velocidad",
    "",
    "Niveles:",
    "- Nivel 1-4: oleadas de enemigos",
    "- Nivel 5: JEFE FINAL (jefe)",
    "- Nivel 6-9: más oleadas y dificultad",
    "- Nivel 10: JEFE FINAL (jefe)"
  ];

  let y = H/2 - 30;
  for(const line of lines){
    ctx.fillText(line, W/2, y);
    y += (line === "" ? 10 : 20);
  }

  ctx.fillStyle = "#ffffff";
  ctx.font = "bold 18px Arial";
  ctx.fillText("Presiona ENTER / ESPACIO / E o haz click para empezar", W/2, H/2 + 150);

  ctx.restore();
}

loop();
</script>
